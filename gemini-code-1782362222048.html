<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cup of Excellence Thailand — แบบฟอร์มลงทะเบียนส่งกาแฟเข้าประกวด</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />

  <style>
    /* =========================================================
       DESIGN TOKENS — Dark Mode & Brand Colors
    ========================================================= */
    :root {
      --bg-main:       #131314; /* สีพื้นหลังหลัก (Dark Mode) */
      --bg-card:       #1e1e20; /* สีพื้นหลังของกล่องข้อความ */
      --bg-input:      #2a2a2c; /* สีพื้นหลังของ Input */
      --border-color:  #3a3a3c; /* สีเส้นขอบ */
      
      /* สีหลักตาม Theme ที่กำหนด */
      --brand-blue:    #24184C; /* สีน้ำเงินหลัก */
      --brand-red:     #D72311; /* สีแดงหลัก */
      --brand-green:   #007A3E; /* สีเขียว */
      --brand-yellow:  #F4D000; /* สีเหลือง */
      
      /* สีสำหรับสถานะและข้อความ */
      --text-main:     #e3e3e3; /* สีข้อความหลัก */
      --text-sub:      #a1a1a5; /* สีข้อความรอง */
      --text-muted:    #757579; /* สีข้อความจางๆ */
      
      --green-bg:      rgba(0, 122, 62, 0.15);
      --red-bg:        rgba(215, 35, 17, 0.15);
      --yellow-bg:     rgba(244, 208, 0, 0.15);
      
      --shadow-s:    0 1px 4px rgba(0,0,0,.3);
      --shadow-m:    0 4px 16px rgba(0,0,0,.4);
      --shadow-l:    0 12px 40px rgba(0,0,0,.6);
      --radius:      10px;
    }

    /* =========================================================
       RESET & BASE
    ========================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      font-size: 15px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    /* =========================================================
       HEADER — Brand Premium Gradient
    ========================================================= */
    .site-header {
      background: linear-gradient(135deg, #120b29 0%, var(--brand-blue) 60%, #3a1e54 100%);
      color: #fff;
      padding: 48px 24px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
      border-bottom: 2px solid var(--brand-red);
    }

    /* Coffee ring watermark styled to match brand colors */
    .site-header::before {
      content: '';
      position: absolute;
      right: -60px; top: -60px;
      width: 280px; height: 280px;
      border-radius: 50%;
      border: 32px solid rgba(244, 208, 0, 0.04);
      pointer-events: none;
    }
    .site-header::after {
      content: '';
      position: absolute;
      right: 20px; top: 20px;
      width: 180px; height: 180px;
      border-radius: 50%;
      border: 18px solid rgba(215, 35, 17, 0.04);
      pointer-events: none;
    }

    .header-eyebrow {
      display: inline-block;
      background: var(--brand-yellow);
      color: #000;
      font-size: 10.5px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 4px 18px;
      border-radius: 20px;
      margin-bottom: 18px;
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
      letter-spacing: -0.5px;
    }

    .header-title em {
      font-style: normal;
      color: var(--brand-yellow);
    }

    .header-divider {
      width: 48px; height: 3px;
      background: linear-gradient(90deg, var(--brand-red), var(--brand-yellow));
      border-radius: 2px;
      margin: 16px auto;
    }

    .header-sub {
      font-size: 14px;
      color: rgba(255,255,255,.7);
      letter-spacing: .3px;
    }

    /* =========================================================
       STATUS BAR (sticky)
    ========================================================= */
    .status-bar {
      position: sticky;
      top: 0;
      z-index: 90;
      background: #1a1a1c;
      border-bottom: 1.5px solid var(--border-color);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow-s);
      flex-wrap: wrap;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 20px;
      white-space: nowrap;
      transition: background .3s, color .3s;
    }
    .status-pill.checked   { background: var(--green-bg); color: #00ff80; }
    .status-pill.unchecked { background: var(--red-bg); color: #ff5252; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      animation: blink 2s ease-in-out infinite;
    }
    .checked   .status-dot { background: #00ff80; }
    .unchecked .status-dot { background: #ff5252; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    .progress-wrap {
      flex: 1;
      min-width: 140px;
    }
    .progress-track {
      height: 5px;
      background: var(--border-color);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--brand-blue), var(--brand-yellow));
      border-radius: 3px;
      transition: width .5s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }
    .progress-label {
      font-size: 11px;
      color: var(--text-sub);
      text-align: right;
      margin-top: 2px;
    }

    .status-timestamp {
      font-size: 12px;
      color: var(--text-sub);
      white-space: nowrap;
      margin-left: auto;
    }

    /* =========================================================
       MAIN LAYOUT
